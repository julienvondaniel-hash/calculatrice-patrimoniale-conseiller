<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0E5251" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Calculatrice conseiller Hexa</title>
<link rel="manifest" href="manifest.webmanifest" />
<style>
  :root{
    --navy:#0E5251; --navy-2:#16706E; --slate:#7FA3A2; --slate-2:#A9C4C3;
    --ink:#1F2D33; --line:#DDE7E6; --line-2:#EAF0EF; --bg:#F4F8F7;
    --white:#fff; --accent:#C9A24B; --gold:#C9A24B; --danger:#C0392B; --field:#FBFDFC;
    --shadow:0 10px 30px rgba(14,82,81,.14);
    --r:26px; --rs:18px;
    --pill:#0E5251;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--navy); color:var(--ink);
    overscroll-behavior:none;
  }
  #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:var(--navy)}
  .hidden{display:none !important}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:30;background:var(--navy);
    padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .btn-back{
    border:none;background:rgba(255,255,255,.10);color:#D7D9E6;
    font-weight:700;font-size:14px;letter-spacing:.5px;
    padding:11px 18px;border-radius:30px;display:flex;align-items:center;gap:6px;cursor:pointer;
  }
  .btn-back:active{background:rgba(255,255,255,.18)}
  .status{
    background:rgba(255,255,255,.10);color:#D7D9E6;font-weight:700;font-size:13px;letter-spacing:.5px;
    padding:11px 16px;border-radius:30px;display:flex;align-items:center;gap:8px;
  }
  .dot{width:11px;height:11px;border-radius:50%;background:#1F8A5B;box-shadow:0 0 0 3px rgba(31,138,91,.25)}

  /* ---------- Hero header ---------- */
  .hero{background:var(--navy);color:#fff;text-align:center;padding:6px 22px 30px}
  .hero .icon{
    width:118px;height:118px;border-radius:50%;border:2px solid rgba(255,255,255,.25);
    margin:6px auto 14px;display:flex;align-items:center;justify-content:center;
  }
  .hero .icon svg{width:46px;height:46px;stroke:#fff}
  .hero .eyebrow{color:var(--slate);font-weight:800;font-size:13px;letter-spacing:1.5px;margin-bottom:8px}
  .hero h1{font-size:34px;line-height:1.12;margin:0;font-weight:800;letter-spacing:-.5px}

  /* ---------- Sheet (white rounded content) ---------- */
  .sheet{
    background:var(--bg);border-radius:30px 30px 0 0;flex:1;
    padding:26px 18px 130px;position:relative;z-index:5;
  }
  .card{
    background:var(--white);border-radius:var(--r);padding:22px 20px;margin-bottom:16px;
    box-shadow:0 6px 18px rgba(38,42,65,.05);
  }
  .card.flat{box-shadow:none;border:1px solid var(--line-2)}

  label.field-label{display:block;font-size:20px;font-weight:600;color:var(--ink);margin:2px 2px 12px}
  .field-label.center{text-align:center;color:var(--slate);font-weight:700}
  .hint{font-size:13px;color:var(--slate);margin:-6px 2px 14px;line-height:1.4}

  /* inputs */
  .input-wrap{position:relative;margin-bottom:6px}
  .inp{
    width:100%;border:1.5px solid var(--line);background:var(--field);border-radius:40px;
    padding:20px 64px 20px 24px;font-size:19px;color:var(--ink);font-weight:500;outline:none;
    -webkit-appearance:none;appearance:none;
  }
  .inp::placeholder{color:#B9BCCC}
  .inp:focus{border-color:var(--navy)}
  .inp.text-right{text-align:right}
  .suffix{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    width:54px;height:54px;border-radius:50%;background:#EBECF3;color:#5A5F78;
    display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;pointer-events:none;
  }

  /* stepper */
  .stepper{display:flex;align-items:center;border:1.5px solid var(--line);background:var(--field);border-radius:40px;padding:8px}
  .stepper input{flex:1;border:none;background:transparent;text-align:center;font-size:22px;font-weight:700;color:var(--ink);outline:none;width:100%;min-width:0}
  .step-btn{
    width:60px;height:60px;border-radius:50%;border:none;background:#EBECF3;color:#5A5F78;
    font-size:30px;font-weight:400;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;
  }
  .step-btn:active{background:#DCDEEA}

  /* select */
  select.inp{padding-right:54px;background-image:none}
  .select-wrap{position:relative}
  .select-wrap::after{
    content:"";position:absolute;right:26px;top:50%;width:12px;height:12px;border-right:2.5px solid #5A5F78;border-bottom:2.5px solid #5A5F78;
    transform:translateY(-70%) rotate(45deg);pointer-events:none;
  }

  /* toggle group (Oui/Non, 360/365, abattement) */
  .toggle{display:flex;border:1.5px solid var(--line);border-radius:40px;padding:6px;gap:4px;background:var(--field)}
  .toggle button{
    flex:1;border:none;background:transparent;border-radius:34px;padding:18px 10px;font-size:18px;font-weight:600;color:var(--slate);cursor:pointer;
  }
  .toggle button.active{background:var(--navy);color:#fff}

  /* segmented tabs (dates AVANT/APRES) */
  .seg{display:flex;gap:12px}
  .seg button{
    flex:1;border:none;border-radius:18px;padding:26px 16px;text-align:left;cursor:pointer;
    background:#fff;border:1.5px solid var(--line-2);
  }
  .seg button .big{display:block;font-size:26px;font-weight:800;color:var(--ink);letter-spacing:.5px}
  .seg button .sm{display:block;font-size:14px;color:var(--slate);margin-top:4px;font-weight:600}
  .seg button.active{background:#9CA0B8;border-color:#9CA0B8}
  .seg button.active .big,.seg button.active .sm{color:#fff}

  .section-title{font-size:26px;font-weight:800;color:var(--ink);margin:0 2px 16px}
  .sub-title{font-size:22px;font-weight:800;color:var(--ink);margin:6px 2px 14px}

  /* primary actions */
  .actions{margin-top:22px}
  .btn-primary{
    width:100%;border:none;background:var(--navy);color:#fff;font-size:20px;font-weight:700;
    padding:22px;border-radius:40px;cursor:pointer;box-shadow:var(--shadow);
  }
  .btn-primary:active{background:#1d2134}
  .btn-ghost{
    width:100%;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-size:19px;font-weight:600;
    padding:20px;border-radius:40px;cursor:pointer;margin-top:14px;
  }

  /* result */
  .result{background:var(--navy);color:#fff;border-radius:var(--r);padding:24px 22px;margin-top:18px}
  .result h3{margin:0 0 14px;font-size:14px;letter-spacing:1px;color:var(--slate-2);font-weight:800;text-transform:uppercase}
  .result .row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.10)}
  .result .row:last-child{border-bottom:none}
  .result .row .k{color:#C9CCDD;font-size:15px}
  .result .row .v{font-size:19px;font-weight:700}
  .result .row.total .k{color:#fff;font-weight:700;font-size:17px}
  .result .row.total .v{font-size:26px;color:var(--accent)}
  .result .note{margin-top:12px;font-size:12.5px;color:#9da1bb;line-height:1.5}

  /* menu list */
  .menu-item{
    background:#fff;border-radius:22px;padding:26px 22px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;box-shadow:0 4px 14px rgba(38,42,65,.05);
  }
  .menu-item:active{transform:scale(.99)}
  .menu-item .mt{font-size:21px;font-weight:700;color:var(--ink)}
  .menu-item .ma{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none}
  .menu-item .ma::after{content:"";width:11px;height:11px;border-right:2.5px solid #5A5F78;border-bottom:2.5px solid #5A5F78;transform:rotate(-45deg);margin-left:-3px}
  .group-label{color:var(--slate-2);font-weight:800;font-size:12px;letter-spacing:1.5px;margin:18px 4px 12px;text-transform:uppercase}
  .group-label:first-child{margin-top:0}

  /* bottom nav */
  .bottomnav{
    position:sticky;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line-2);
    display:flex;justify-content:space-around;padding:14px 0 calc(env(safe-area-inset-bottom) + 10px);
  }
  .bottomnav button{border:none;background:none;cursor:pointer;color:#5A5F78;padding:8px 22px;border-radius:14px}
  .bottomnav button svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2}
  .bottomnav button.active{color:var(--navy)}

  /* ---------- Login ---------- */
  #screen-auth{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 26px calc(env(safe-area-inset-bottom) + 26px);background:var(--navy)}
  .auth-logo{width:auto;max-width:230px;background:#fff;border-radius:20px;padding:14px 20px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
  .auth-logo img{width:100%;height:auto;display:block}
  .auth-logo svg{width:40px;height:40px;stroke:#fff}
  #screen-auth h1{color:#fff;text-align:center;font-size:30px;font-weight:800;margin:0 0 6px;letter-spacing:-.5px}
  #screen-auth p.sub{color:var(--slate-2);text-align:center;margin:0 0 30px;font-size:15px}
  .auth-card{background:#fff;border-radius:28px;padding:24px 20px}
  .auth-field{margin-bottom:14px}
  .auth-field label{display:block;font-size:14px;font-weight:700;color:var(--ink);margin:0 2px 8px}
  .auth-field input{
    width:100%;border:1.5px solid var(--line);background:var(--field);border-radius:18px;padding:17px 18px;font-size:16px;outline:none;
  }
  .auth-field input:focus{border-color:var(--navy)}
  .auth-err{background:#FDECEC;color:#C0282D;border-radius:14px;padding:12px 14px;font-size:13.5px;margin-bottom:14px;line-height:1.4}
  .auth-switch{text-align:center;margin-top:18px;color:var(--slate-2);font-size:14px}
  .auth-switch a{color:#fff;font-weight:700;text-decoration:none;cursor:pointer}
  .auth-config-note{margin-top:22px;text-align:center;font-size:12px;color:#6B7090;line-height:1.5}
  .auth-config-note code{color:#9da1bb}

  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 90px);transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:13px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:60;
    box-shadow:var(--shadow);opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  .spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  .info-i{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-style:italic;margin-left:6px;vertical-align:middle;cursor:pointer}
  .req{color:var(--danger)}

  @media (max-width:380px){
    .hero h1{font-size:29px}
    .inp{font-size:17px}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ AUTH ============ -->
  <section id="screen-auth">
    <div class="auth-logo"><img src="logo-hexa.png" alt="HEXA Patrimoine" /></div>
    <h1 id="auth-title">Connexion</h1>
    <p class="sub" id="auth-sub">Accédez à vos calculatrices patrimoniales</p>
    <div class="auth-card">
      <div id="auth-error" class="auth-err hidden"></div>
      <div class="auth-field" id="name-field" style="display:none">
        <label>Nom</label>
        <input id="auth-name" type="text" autocomplete="name" placeholder="Votre nom" />
      </div>
      <div class="auth-field">
        <label>Adresse e-mail</label>
        <input id="auth-email" type="email" autocomplete="email" inputmode="email" placeholder="vous@exemple.fr" />
      </div>
      <div class="auth-field">
        <label>Mot de passe</label>
        <input id="auth-pass" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button class="btn-primary" id="auth-submit">Se connecter</button>
    </div>
    <div class="auth-switch">
      <span id="auth-switch-text">Pas encore de compte ?</span>
      <a id="auth-switch-link">Créer un compte</a>
    </div>
    <div class="auth-config-note" id="auth-config-note"></div>
  </section>

  <!-- ============ MAIN APP ============ -->
  <div id="screen-main" class="hidden" style="display:flex;flex-direction:column;flex:1">
    <div class="topbar">
      <button class="btn-back" id="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        RETOUR
      </button>
      <div class="status"><span class="dot"></span> EN LIGNE</div>
    </div>
    <div id="view"></div>
    <div class="bottomnav">
      <button data-nav="home" class="active" aria-label="Accueil">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      </button>
      <button data-nav="account" aria-label="Compte">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      </button>
      <button data-nav="notif" aria-label="Notifications">
        <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="simulateurs.js"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
</body>
</html>
