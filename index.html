<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#FFFFFF" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Mon Kap Pro</title>
<link rel="manifest" href="manifest.webmanifest" />
<style>
  :root{
    --navy:#4F46E5; --navy-2:#6366F1; --slate:#6B7290; --slate-2:#8A90AC;
    --ink:#1E2348; --line:#E6E9F2; --line-2:#EEF1F7; --bg:#F5F6FB;
    --white:#fff; --accent:#12B981; --gold:#12B981; --danger:#E5484D; --field:#FBFCFE;
    --shadow:0 12px 30px rgba(79,70,229,.18);
    --r:22px; --rs:16px;
    --pill:#4F46E5;
    --grad:linear-gradient(135deg,#4F46E5,#6366F1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#FFFFFF; color:var(--ink);
    overscroll-behavior:none;
  }
  #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:#FFFFFF}
  .hidden{display:none !important}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:30;background:#FFFFFF;
    padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .btn-back{
    border:none;background:#EEF1F7;color:#3A4063;
    font-weight:700;font-size:14px;letter-spacing:.5px;
    padding:11px 18px;border-radius:30px;display:flex;align-items:center;gap:6px;cursor:pointer;
  }
  .btn-back:active{background:#E2E6F0}
  .status{
    background:#EEF1F7;color:#3A4063;font-weight:700;font-size:13px;letter-spacing:.5px;
    padding:11px 16px;border-radius:30px;display:flex;align-items:center;gap:8px;
  }
  .dot{width:11px;height:11px;border-radius:50%;background:#12B981;box-shadow:0 0 0 3px rgba(18,185,129,.22)}

  /* ---------- Hero header ---------- */
  .hero{background:#FFFFFF;color:var(--ink);text-align:center;padding:2px 18px 16px}
  .hero .icon{
    width:78px;height:78px;border-radius:50%;border:2px solid var(--line);
    margin:4px auto 10px;display:flex;align-items:center;justify-content:center;
  }
  .hero .icon svg{width:32px;height:32px;stroke:var(--navy)}
  .hero .eyebrow{color:var(--slate);font-weight:800;font-size:11px;letter-spacing:1.4px;margin-bottom:5px}
  .hero h1{font-size:25px;line-height:1.12;margin:0;font-weight:800;letter-spacing:-.4px}

  /* ---------- Sheet (white rounded content) ---------- */
  .sheet{
    background:var(--bg);border-radius:30px 30px 0 0;flex:1;
    padding:18px 14px 100px;position:relative;z-index:5;border-top:1px solid var(--line-2);
  }
  .card{
    background:var(--white);border-radius:var(--r);padding:15px 16px;margin-bottom:11px;
    box-shadow:0 6px 18px rgba(27,37,89,.05);
  }
  .card.flat{box-shadow:none;border:1px solid var(--line-2)}

  label.field-label{display:block;font-size:15.5px;font-weight:600;color:var(--ink);margin:1px 2px 9px}
  .field-label.center{text-align:center;color:var(--slate);font-weight:700}
  .hint{font-size:12.5px;color:var(--slate);margin:-4px 2px 11px;line-height:1.4}

  /* inputs */
  .input-wrap{position:relative;margin-bottom:6px}
  .inp{
    width:100%;border:1.5px solid var(--line);background:var(--field);border-radius:30px;
    padding:13px 50px 13px 18px;font-size:16px;color:var(--ink);font-weight:500;outline:none;
    -webkit-appearance:none;appearance:none;
  }
  .inp::placeholder{color:#B9BCCC}
  .inp:focus{border-color:var(--navy)}
  .inp.text-right{text-align:right}
  .suffix{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    width:40px;height:40px;border-radius:50%;background:#EBECF3;color:#5A5F78;
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;pointer-events:none;
  }

  /* stepper */
  .stepper{display:flex;align-items:center;border:1.5px solid var(--line);background:var(--field);border-radius:40px;padding:8px}
  .stepper input{flex:1;border:none;background:transparent;text-align:center;font-size:18px;font-weight:700;color:var(--ink);outline:none;width:100%;min-width:0}
  .step-btn{
    width:44px;height:44px;border-radius:50%;border:none;background:#EBECF3;color:#5A5F78;
    font-size:24px;font-weight:400;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;
  }
  .step-btn:active{background:#DCDEEA}

  /* select */
  select.inp{padding-right:46px;background-image:none}
  .select-wrap{position:relative}
  .select-wrap::after{
    content:"";position:absolute;right:26px;top:50%;width:12px;height:12px;border-right:2.5px solid #5A5F78;border-bottom:2.5px solid #5A5F78;
    transform:translateY(-70%) rotate(45deg);pointer-events:none;
  }

  /* toggle group (Oui/Non, 360/365, abattement) */
  .toggle{display:flex;border:1.5px solid var(--line);border-radius:40px;padding:6px;gap:4px;background:var(--field)}
  .toggle button{
    flex:1;border:none;background:transparent;border-radius:26px;padding:12px 8px;font-size:14.5px;font-weight:600;color:var(--slate);cursor:pointer;
  }
  .toggle button.active{background:var(--navy);color:#fff}

  /* segmented tabs (dates AVANT/APRES) */
  .seg{display:flex;gap:12px}
  .seg button{
    flex:1;border:none;border-radius:18px;padding:26px 16px;text-align:left;cursor:pointer;
    background:#fff;border:1.5px solid var(--line-2);
  }
  .seg button .big{display:block;font-size:26px;font-weight:800;color:var(--ink);letter-spacing:.5px}
  .seg button .sm{display:block;font-size:14px;color:var(--slate);margin-top:4px;font-weight:600}
  .seg button.active{background:var(--grad);border-color:transparent}
  .seg button.active .big,.seg button.active .sm{color:#fff}

  .section-title{font-size:19px;font-weight:800;color:var(--ink);margin:0 2px 12px}
  .sub-title{font-size:17px;font-weight:800;color:var(--ink);margin:4px 2px 10px}

  /* primary actions */
  .actions{margin-top:16px}
  .btn-primary{
    width:100%;border:none;background:var(--grad);color:#fff;font-size:16.5px;font-weight:700;
    padding:15px;border-radius:30px;cursor:pointer;box-shadow:0 10px 24px rgba(79,70,229,.32);
  }
  .btn-primary:active{filter:brightness(.95)}
  .btn-ghost{
    width:100%;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-size:15.5px;font-weight:600;
    padding:14px;border-radius:30px;cursor:pointer;margin-top:10px;
  }

  /* result */
  .result{background:linear-gradient(135deg,#4F46E5,#3730A3);color:#fff;border-radius:var(--r);padding:16px 18px;margin-top:14px;box-shadow:0 14px 34px rgba(55,48,163,.28)}
  .result h3{margin:0 0 10px;font-size:12.5px;letter-spacing:1px;color:var(--slate-2);font-weight:800;text-transform:uppercase}
  .result .row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.10)}
  .result .row:last-child{border-bottom:none}
  .result .row .k{color:#C9CCDD;font-size:13.5px}
  .result .row .v{font-size:16px;font-weight:700}
  .result .row.total .k{color:#fff;font-weight:700;font-size:15px}
  .result .row.total .v{font-size:21px;color:var(--accent)}
  .result .note{margin-top:12px;font-size:12.5px;color:#9da1bb;line-height:1.5}

  /* menu list */
  .menu-item{
    background:#fff;border-radius:18px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;box-shadow:0 4px 14px rgba(27,37,89,.05);
  }
  .menu-item:active{transform:scale(.99)}
  .menu-item .mt{font-size:16.5px;font-weight:700;color:var(--ink)}
  .menu-item .ma{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none}
  .menu-item .ma::after{content:"";width:11px;height:11px;border-right:2.5px solid #5A5F78;border-bottom:2.5px solid #5A5F78;transform:rotate(-45deg);margin-left:-3px}
  .group-label{color:var(--slate-2);font-weight:800;font-size:11px;letter-spacing:1.3px;margin:12px 4px 9px;text-transform:uppercase}
  .group-label:first-child{margin-top:0}

  /* bottom nav */
  .bottomnav{
    position:sticky;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line-2);
    display:flex;justify-content:space-around;padding:14px 0 calc(env(safe-area-inset-bottom) + 10px);
  }
  .bottomnav button{border:none;background:none;cursor:pointer;color:#5A5F78;padding:8px 22px;border-radius:14px}
  .bottomnav button svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:2}
  .bottomnav button.active{color:var(--navy)}

  /* ---------- Login ---------- */
  #screen-auth{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 26px calc(env(safe-area-inset-bottom) + 26px);background:var(--bg)}
  .auth-logo{display:flex;align-items:center;justify-content:center;margin:0 auto 26px}
  .auth-logo svg{width:40px;height:40px;stroke:#fff}
  #screen-auth h1{color:var(--ink);text-align:center;font-size:30px;font-weight:800;margin:0 0 6px;letter-spacing:-.5px}
  #screen-auth p.sub{color:var(--slate);text-align:center;margin:0 0 30px;font-size:15px}
  .auth-card{background:#fff;border-radius:28px;padding:24px 20px;box-shadow:0 14px 40px rgba(27,37,89,.10);border:1px solid var(--line-2)}
  .auth-field{margin-bottom:14px}
  .auth-field label{display:block;font-size:14px;font-weight:700;color:var(--ink);margin:0 2px 8px}
  .auth-field input{
    width:100%;border:1.5px solid var(--line);background:var(--field);border-radius:16px;padding:13px 16px;font-size:15px;outline:none;
  }
  .auth-field input:focus{border-color:var(--navy)}
  .auth-err{background:#FDECEC;color:#C0282D;border-radius:14px;padding:12px 14px;font-size:13.5px;margin-bottom:14px;line-height:1.4}
  .auth-switch{text-align:center;margin-top:18px;color:var(--slate-2);font-size:14px}
  .auth-switch a{color:var(--navy);font-weight:700;text-decoration:none;cursor:pointer}
  .auth-config-note{margin-top:22px;text-align:center;font-size:12px;color:var(--slate);line-height:1.5}
  .auth-config-note code{color:#9da1bb}

  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 90px);transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:13px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:60;
    box-shadow:var(--shadow);opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  .spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  .info-i{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-style:italic;margin-left:6px;vertical-align:middle;cursor:pointer}
  .req{color:var(--danger)}

  @media (max-width:380px){
    .hero h1{font-size:29px}
    .inp{font-size:17px}
  }

  /* ---------- Export PDF (impression) ---------- */
  #print-root{display:none}
  @media print{
    @page{size:A4;margin:14mm}
    body{background:#fff!important}
    #app,.toast{display:none!important}
    #print-root{display:block!important;color:#23263A;font-family:"Inter",Arial,sans-serif}
    .pr-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1F2547;padding-bottom:12px;margin-bottom:18px}
    .pr-logo img{max-height:70px;max-width:220px}
    .pr-logo .wm{margin-bottom:4px}
    .pr-contact{text-align:right;font-size:12px;color:#4a4f6a;line-height:1.55}
    .pr-contact b{color:#1F2547;font-size:13px}
    .pr-title{font-size:20px;font-weight:800;color:#1F2547;margin:6px 0 2px}
    .pr-date{font-size:11px;color:#8A8FB0;margin-bottom:14px}
    table.pr-tbl{width:100%;border-collapse:collapse;font-size:13px}
    table.pr-tbl td{padding:9px 10px;border-bottom:1px solid #E3E5F0}
    table.pr-tbl td:last-child{text-align:right;font-weight:700}
    table.pr-tbl tr.tot td{border-top:2px solid #1F2547;font-weight:800;font-size:15px;color:#1F2547}
    .pr-note{margin-top:16px;font-size:10.5px;color:#8A8FB0;line-height:1.5}
    .pr-foot{margin-top:22px;border-top:1px solid #E3E5F0;padding-top:8px;font-size:10px;color:#AAB0CE;display:flex;justify-content:space-between}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ AUTH ============ -->
  <section id="screen-auth">
    <div class="auth-logo"><svg viewBox="0 0 250 56" xmlns="http://www.w3.org/2000/svg" style="width:230px;max-width:78vw;height:auto">
  <rect x="2" y="8" width="40" height="40" rx="11" fill="#12B981"/>
  <rect x="11" y="29" width="6" height="11" rx="2" fill="#fff"/>
  <rect x="20" y="23" width="6" height="17" rx="2" fill="#fff"/>
  <rect x="29" y="16" width="6" height="24" rx="2" fill="#fff"/>
  <path d="M12 24 L22 19 L33 13" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="33" cy="13" r="2.4" fill="#fff"/>
  <text x="52" y="37" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="800" fill="#4338CA">Mon Kap <tspan fill="#12B981">Pro</tspan></text>
</svg></div>
    <h1 id="auth-title">Connexion</h1>
    <p class="sub" id="auth-sub">Accédez à vos calculatrices patrimoniales</p>
    <div class="auth-card">
      <div id="auth-error" class="auth-err hidden"></div>
      <div class="auth-field" id="name-field" style="display:none">
        <label>Nom</label>
        <input id="auth-name" type="text" autocomplete="name" placeholder="Votre nom" />
      </div>
      <div class="auth-field">
        <label>Adresse e-mail</label>
        <input id="auth-email" type="email" autocomplete="email" inputmode="email" placeholder="vous@exemple.fr" />
      </div>
      <div class="auth-field">
        <label>Mot de passe</label>
        <input id="auth-pass" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button class="btn-primary" id="auth-submit">Se connecter</button>
      <div style="text-align:center;margin-top:14px"><a id="auth-forgot" style="color:var(--slate-2);font-size:13.5px;cursor:pointer;text-decoration:underline">Mot de passe oublié ?</a></div>
    </div>
    <div class="auth-switch">
      <span id="auth-switch-text">Pas encore de compte ?</span>
      <a id="auth-switch-link">Créer un compte</a>
    </div>
    <div class="auth-config-note" id="auth-config-note"></div>
  </section>

  <!-- ============ MAIN APP ============ -->
  <div id="screen-main" class="hidden" style="display:flex;flex-direction:column;flex:1">
    <div class="topbar">
      <button class="btn-back" id="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        RETOUR
      </button>
    </div>
    <div id="view"></div>
    <div class="bottomnav">
      <button data-nav="home" class="active" aria-label="Accueil">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      </button>
      <button data-nav="account" aria-label="Compte">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      </button>
      <button data-nav="notif" aria-label="Notifications">
        <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</div>
<div id="print-root"></div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="simulateurs.js"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
</body>
</html>
